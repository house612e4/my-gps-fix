<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GPS Stealth Shield v4.0</title>
    <style>
        body { 
            background: #000; 
            color: #00ff41; 
            font-family: 'Courier New', monospace; 
            text-align: center; 
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            border: 2px solid #00ff41;
            margin: 20px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
        }
        .loc-info {
            background: rgba(0, 255, 65, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid #00ff41;
        }
        #target { color: #ffcc00; font-weight: bold; font-size: 18px; }
        .btn { 
            background: transparent; 
            border: 2px solid #00ff41; 
            color: #00ff41; 
            padding: 20px 40px; 
            font-size: 20px; 
            font-weight: bold;
            border-radius: 50px; 
            cursor: pointer;
            box-shadow: 0 0 10px #00ff41;
        }
        .btn:active { 
            background: #00ff41; 
            color: #000;
        }
        #status { margin-top: 20px; font-size: 14px; font-weight: bold; color: #888; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="font-size: 20px;">GPS SYSTEM BYPASS</h1>
        
        <div class="loc-info">
            <p style="margin: 0 0 10px 0; font-size: 12px;">ACTIVE TARGET:</p>
            <p id="target">341 9th St, Brooklyn, NY</p>
        </div>

        <button class="btn" onclick="requestAndStart()">ACTIVATE SHIELD</button>
        
        <p id="status">STATUS: STANDBY</p>
    </div>

    <script>
        const targetLat = 40.670543; 
        const targetLng = -73.987114;

        function requestAndStart() {
            // আইফোন পারমিশন ট্রিগার করা
            navigator.geolocation.getCurrentPosition((pos) => {
                startHighPrioritySpoof();
            }, (err) => {
                alert("সাফারিতে লোকেশন 'Allow' করুন! (Settings > Safari > Location)");
            }, { enableHighAccuracy: true });
        }

        function startHighPrioritySpoof() {
            document.getElementById('status').innerText = "HIJACKING SYSTEM GPS...";
            document.getElementById('status').classList.add('blink');
            document.getElementById('status').style.color = "#ffcc00";

            // ব্রাউজারের অরিজিনাল ফাংশনগুলোকে পুরোপুরি রিপ্লেস করা
            const fakeData = {
                coords: {
                    latitude: targetLat,
                    longitude: targetLng,
                    accuracy: 1, // সর্বোচ্চ একুরেসি যাতে আইফোন বিশ্বাস করে
                    altitude: 10,
                    altitudeAccuracy: 1,
                    heading: null,
                    speed: 0
                },
                timestamp: Date.now()
            };

            // ১. getCurrentPosition ওভাররাইড
            navigator.geolocation.getCurrentPosition = function(success) {
                success(fakeData);
            };

            // ২. watchPosition ওভাররাইড (অ্যাপ রিফ্রেশ হলে কাজ করবে)
            navigator.geolocation.watchPosition = function(success) {
                setInterval(() => {
                    success({
                        coords: { ...fakeData.coords },
                        timestamp: Date.now()
                    });
                }, 500); // প্রতি ৫০০ মিলিসেকেন্ডে ডাটা পাঠাবে
            };

            setTimeout(() => {
                document.getElementById('status').innerText = "SYSTEM MASKED: 341 9TH ST";
                document.getElementById('status').style.color = "#ff3333";
                document.getElementById('status').classList.remove('blink');
                alert("শিল্ড এখন সক্রিয়!\nএখন সাফারিতে নতুন ট্যাবে ম্যাপ চেক করুন।");
            }, 2000);
        }
    </script>
</body>
</html>
