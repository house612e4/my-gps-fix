            let income = 0;
            let expense = 0;
            let totalBalance = 0;

            transactions.forEach(t => {

              if (t.type === 'expense' || t.type === 'lent') expense += Number(t.amount);

            accounts.forEach(a => {
              totalBalance += Number(a.balance);
            });

            return { income, expense, totalBalance };
          };

          const relPriority = { 'আমি': 1, 'স্বামী': 2, 'স্ত্রী': 2, 'ছেলে': 3, 'মেয়ে': 3, 'মা': 4, 'বাবা': 4, 'ভাই': 5, 'বোন': 5 };
          const sortedMembers = [...members].sort((a, b) => (relPriority[a.relation] || 99) - (relPriority[b.relation] || 99));

          if (isInitializing) return <div className="min-h-screen bg-indigo-50 flex items-center justify-center">লোড হচ্ছে...</div>;

          if (authStatus === 'locked') {
            return (
              <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

                  </div>

                  <p className="text-white/80 mb-8 text-center text-sm font-medium">আপনার ব্যক্তিগত জগতে প্রবেশ করুন</p>
                  
                  <div className="w-full relative mb-6">
                    <input
                      type="password"
                      value={pinInput}
                      onChange={(e) => setPinInput(e.target.value)}
                      placeholder="গোপন পিন লিখুন"
                      className="w-full bg-black/40 border border-white/20 text-white rounded-2xl py-4 text-center text-xl tracking-widest focus:outline-none focus:ring-2 focus:ring-orange-400/50 shadow-inner placeholder-white/40"

                  </div>
                  <button onClick={handleMainLogin} className="w-full py-4 rounded-2xl bg-gradient-to-r from-orange-300 to-rose-400 text-gray-900 font-bold text-lg shadow-lg hover:opacity-90 active:scale-95 transition-all">

              <div onClick={() => setCurrentView('finance')} className="bg-[#82dfc7] rounded-3xl p-6 flex flex-col items-center justify-center cursor-pointer shadow-sm hover:opacity-90 active:scale-95 transition-all aspect-[4/3]">

                    <div className="mt-4 space-y-3">

                              <p className="text-xs text-gray-500">{tr.date} • {accounts.find(a=>a.id===tr.accountId)?.name || 'Unknown'}</p>
                              {tr.note && <p className="text-sm text-gray-600 mt-1">{tr.note}</p>}
                            </div>
                            <div className="text-right">
                              <p className={`font-bold ${tr.type==='income'||tr.type==='borrowed' ? 'text-emerald-600' : 'text-rose-600'}`}>
                                {tr.type==='income'||tr.type==='borrowed'?'+':'-'}{formatMoney(tr.amount)}

                              <span className="text-[10px] px-2 py-0.5 bg-gray-200 rounded-full text-gray-600">{tr.type}</span>
                            </div>
                          </div>
                          <div className="flex justify-end gap-3 mt-2 border-t border-gray-200 pt-2">

                            <button onClick={() => deleteData('finance_transactions', tr.id)} className="text-xs text-rose-600">ডিলেট</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          };

          const renderMembers = () => (
            <div className="space-y-4">
              <button onClick={() => { setEditingItem(null); setUploadedImage(null); setActiveModal('member'); }} className="w-full py-3 bg-indigo-500 text-white rounded-xl font-bold flex justify-center items-center gap-2"><i className="fas fa-plus"></i> নতুন সদস্য</button>
              <div className="grid grid-cols-2 gap-4">
                {sortedMembers.map(m => (
                  <div key={m.id} onClick={() => { setEditingItem(m); setUploadedImage(null); setActiveModal('member'); }} className="relative aspect-[3/4] rounded-3xl overflow-hidden shadow-sm group cursor-pointer border border-white/50 bg-white/20">
                    {m.imageUrl ? (
                      <img src={m.imageUrl} alt={m.name} className="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"/>

                      <div className="absolute inset-0 w-full h-full bg-gradient-to-br from-indigo-50 to-purple-50 flex flex-col items-center justify-center">
                         <i className="fas fa-user text-4xl text-indigo-200 mb-2"></i>

                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                    
                    <div className="absolute bottom-0 left-0 w-full p-4">

                        <i className="fas fa-trash text-sm"></i>
                    </button>
                  </div>
                ))}
              </div>
            </div>
          );

          const renderStories = () => (
            <div className="space-y-4">
              <button onClick={() => { setEditingItem(null); setActiveModal('story'); }} className="w-full py-3 bg-purple-500 text-white rounded-xl font-bold flex justify-center items-center gap-2"><i className="fas fa-plus"></i> নতুন গল্প লিখুন</button>
              {stories.map(s => (
                <div key={s.id} className="bg-white/60 rounded-2xl p-5">
                  <h4 className="font-bold text-lg text-gray-800 mb-2">{s.title}</h4>
                  <p className="text-gray-600 text-sm whitespace-pre-wrap leading-relaxed">{s.content}</p>
                  <div className="mt-4 flex gap-3">
                    <button onClick={() => { setEditingItem(s); setActiveModal('story'); }} className="text-sm font-medium text-indigo-600">এডিট</button>
                    <button onClick={() => deleteData('stories', s.id)} className="text-sm font-medium text-rose-600">ডিলেট</button>
                  </div>
                </div>
              ))}
            </div>
          );

          const renderDates = () => (
            <div className="space-y-4">
              <button onClick={() => { setEditingItem(null); setActiveModal('date'); }} className="w-full py-3 bg-amber-500 text-white rounded-xl font-bold flex justify-center items-center gap-2"><i className="fas fa-plus"></i> নতুন তারিখ যোগ করুন</button>

                  <div className="bg-[#1e1f2e] w-full max-w-xs rounded-[2rem] p-6 text-center border border-white/10">
                    <i className="fas fa-key text-orange-500 text-4xl mx-auto mb-3"></i>
                    <h3 className="font-bold text-white mb-2">সিকিউর ফোল্ডার</h3>
                    <p className="text-xs text-gray-400 mb-4">পাসওয়ার্ড দেখতে পিন প্রয়োজন</p>
                    <input type="password" value={passPinInput} onChange={(e)=>setPassPinInput(e.target.value)} placeholder="PIN লিখুন" className="w-full bg-[#2a2b3d] text-white rounded-xl px-4 py-3 text-center font-bold tracking-widest mb-4 outline-none border border-white/5 focus:border-orange-500"/>
                    <div className="flex gap-2">
                      <button onClick={() => setPassFolderPinModal(false)} className="flex-1 py-3 bg-white/5 rounded-xl font-bold text-gray-300">বাতিল</button>
                      <button onClick={openPasswordFolder} className="flex-1 py-3 bg-orange-500 rounded-xl font-bold text-white">প্রবেশ করুন</button>
                    </div>
                  </div>
                </div>
              )}

              {/* Data Entry Modals */}
              {activeModal && (
                <div className="fixed inset-0 z-40 flex flex-col justify-end bg-black/50 backdrop-blur-md sm:items-center sm:justify-center p-0 sm:p-4">
                  <div className="bg-[#1e1f2e] w-full sm:max-w-md rounded-t-[2rem] sm:rounded-3xl p-6 max-h-[90vh] overflow-y-auto border border-white/10">
                    <div className="flex justify-between items-center mb-6">
                      <h3 className="text-xl font-bold text-white">তথ্য আপডেট</h3>
                      <button onClick={() => setActiveModal(null)} className="p-2 bg-white/5 text-gray-400 rounded-full hover:text-white"><i className="fas fa-times"></i></button>
                    </div>

                    <form onSubmit={(e) => {
                      e.preventDefault();
                      const fd = new FormData(e.target);
                      const data = Object.fromEntries(fd.entries());
                      
                      let collectionName = '';
                      if (activeModal === 'account') collectionName = 'finance_accounts';
                      if (activeModal === 'transaction') collectionName = 'finance_transactions';
                      if (activeModal === 'member') {
                         collectionName = 'family_members';
                         data.imageUrl = uploadedImage || editingItem?.imageUrl || '';
                      }
                      if (activeModal === 'story') collectionName = 'stories';
                      if (activeModal === 'date') collectionName = 'important_dates';
                      if (activeModal === 'password') collectionName = 'passwords';
                      if (activeModal === 'plan') collectionName = 'future_plans';

                      if (activeModal === 'transaction') {
                        const accId = data.accountId;
                        const acc = accounts.find(a => a.id === accId);
                        if(acc) {
                          const amount = Number(data.amount);
                          let newBalance = Number(acc.balance);
                          if (data.type === 'income' || data.type === 'borrowed') newBalance += amount;
                          if (data.type === 'expense' || data.type === 'lent') newBalance -= amount;
                          saveData('finance_accounts', {...acc, balance: newBalance}, acc.id);
                        }
                      }

                      if (editingItem) {
                        requireSecureAction(() => saveData(collectionName, {...editingItem, ...data}, editingItem.id), 'তথ্য এডিট করতে চান?');
                      } else {
                        saveData(collectionName, data);
                      }
                    }} className="space-y-4">
                      
                      {activeModal === 'account' && (
                        <>
                          <input name="name" defaultValue={editingItem?.name} placeholder="একাউন্টের নাম (যেমন: ডাচ বাংলা, বিকাশ পার্সোনাল)" required className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500" />
                          <select name="type" defaultValue={editingItem?.type || 'bank'} className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500">
                            <option value="cash">ক্যাশ (নগদ টাকা)</option>
                            <option value="bank">ব্যাংক</option>
                            <option value="bkash">বিকাশ/নগদ</option>
                          </select>
                          <input name="balance" type="number" defaultValue={editingItem?.balance || 0} placeholder="বর্তমান ব্যালেন্স" required className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500" />
                        </>
                      )}

                      {activeModal === 'transaction' && (
                        <>
                          <input name="source" defaultValue={editingItem?.source} placeholder={editingItem?.type==='income'?'আয়ের উৎস (যেমন বেতন)':editingItem?.type==='expense'?'ব্যয়ের নাম (যেমন বাজার)':editingItem?.type==='borrowed'?'কার কাছ থেকে ধার নিয়েছো?':'কাকে ধার দিয়েছো / কোন দোকানে বাকি?'} required className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500" />
                          <input name="amount" type="number" defaultValue={editingItem?.amount} placeholder="টাকার পরিমান" required className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500" />
                          <input name="date" type="date" defaultValue={editingItem?.date || new Date().toISOString().split('T')[0]} required className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500" />
                          <select name="accountId" defaultValue={editingItem?.accountId} required className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500">
                            <option value="">কোন একাউন্ট থেকে?</option>
                            {accounts.map(a => <option key={a.id} value={a.id}>{a.name} ({formatMoney(a.balance)})</option>)}
                          </select>
                          <textarea name="note" defaultValue={editingItem?.note} placeholder="বিস্তারিত বিবরণ বা বাজারের লিস্ট..." rows={3} className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500 resize-none"></textarea>
                          <input type="hidden" name="type" value={editingItem?.type || 'income'} />
                        </>
                      )}

                      {activeModal === 'member' && (
                        <>
                          <div className="flex flex-col items-center mb-6">
                             <div className="w-28 h-28 rounded-full bg-[#2a2b3d] border-2 border-dashed border-white/20 flex items-center justify-center overflow-hidden mb-3 relative group">
                                {(uploadedImage || editingItem?.imageUrl) ? (
                                  <img src={uploadedImage || editingItem?.imageUrl} className="w-full h-full object-cover" />
                                ) : (
                                  <i className="fas fa-user text-4xl text-gray-500"></i>
                                )}
                                <input type="file" accept="image/*" onChange={handleImageChange} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                             </div>
                             <div className="text-sm font-medium text-indigo-400 bg-indigo-500/10 px-4 py-2 rounded-full flex items-center gap-2">
                                <i className="fas fa-upload"></i> ছবি নির্বাচন করুন
                             </div>
                          </div>
                          <input name="name" defaultValue={editingItem?.name} placeholder="নাম" required className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500" />
                          <input name="relation" defaultValue={editingItem?.relation} placeholder="সম্পর্ক (আমি, স্বামী, স্ত্রী, ছেলে, মেয়ে, মা, বাবা...)" required className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500" />
                          <input name="mobile" defaultValue={editingItem?.mobile} placeholder="মোবাইল নাম্বার" className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500" />
                          <textarea name="note" defaultValue={editingItem?.note} placeholder="বিস্তারিত ঠিকানা, পেশা ইত্যাদি..." rows={4} className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500 resize-none"></textarea>
                        </>
                      )}

                      {activeModal === 'story' && (
                        <>
                          <input name="title" defaultValue={editingItem?.title} placeholder="গল্পের শিরোনাম" required className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500" />
                          <textarea name="content" defaultValue={editingItem?.content} placeholder="তোমার মনের ভাবগুলো বিস্তারিত লেখো..." rows={6} required className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500 resize-none"></textarea>
                        </>
                      )}

                      {activeModal === 'date' && (
                        <>
                          <input name="title" defaultValue={editingItem?.title} placeholder="কার জন্মদিন বা বিবাহ বার্ষিকী?" required className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500" />
                          <select name="type" defaultValue={editingItem?.type || 'জন্মদিন'} className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500">
                            <option value="জন্মদিন">জন্মদিন</option>
                            <option value="বিবাহ বার্ষিকী">বিবাহ বার্ষিকী</option>
                            <option value="মৃত্যু বার্ষিকী">মৃত্যু বার্ষিকী</option>
                            <option value="অন্যান্য">অন্যান্য</option>
                          </select>
                          <input name="date" type="date" defaultValue={editingItem?.date} required className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500 style-date" />
                        </>
                      )}

                      {activeModal === 'password' && (
                        <>
                          <input name="platform" defaultValue={editingItem?.platform} placeholder="প্ল্যাটফর্ম (যেমন: Facebook, Gmail)" required className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500" />
                          <input name="userId" defaultValue={editingItem?.userId} placeholder="ইউজার আইডি বা ইমেইল" required className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500" />
                          <input name="password" type="password" defaultValue={editingItem?.password} placeholder="পাসওয়ার্ড" required className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500" />
                        </>
                      )}

                      {activeModal === 'plan' && (
                        <>
                          <input name="title" defaultValue={editingItem?.title} placeholder="পরিকল্পনার নাম (যেমন: সিলেট ট্যুর)" required className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500" />
                          <textarea name="details" defaultValue={editingItem?.details} placeholder="বিস্তারিত (কবে যাবে, কাদের সাথে, দাওয়াতের মেনু ইত্যাদি)..." rows={4} required className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500 resize-none"></textarea>
                          <input name="budget" type="number" defaultValue={editingItem?.budget} placeholder="সম্ভাব্য খরচ (ঐচ্ছিক)" className="w-full bg-[#2a2b3d] text-white border border-white/5 rounded-xl p-4 outline-none focus:border-indigo-500" />
                        </>
                      )}

                      <div className="flex gap-3 pt-4">
                        <button type="button" onClick={() => setActiveModal(null)} className="flex-1 py-4 rounded-xl border border-white/10 text-gray-300 font-bold">বাতিল</button>
                        <button type="submit" className="flex-1 py-4 bg-indigo-500 text-white rounded-xl font-bold shadow-lg">সংরক্ষণ করুন</button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
