            initAuth();

              setIsInitializing(false);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
              if (!user) return;
              const seedData = async () => {
                  try {
                      const membersRef = collection(db, 'artifacts', appId, 'users', user.uid, 'family_members');

                          }
                      }

                  }

              setActionPinModal({ show: false, action: null, title: '' });
              setActionPinInput('');

              setActionPinInput('');
            }
          };

          const requireSecureAction = (actionFn, titleText) => {

            const docId = id || Date.now().toString();
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, collectionName, docId);
            await setDoc(docRef, data);
            setActiveModal(null);
          };

          const deleteData = async (collectionName, id) => {
            if (!user) return;
            requireSecureAction(async () => {
              await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, collectionName, id));
            }, 'এই তথ্যটি মুছে ফেলতে চান?');
          };

          const handleImageChange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
              const img = new Image();
              img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 400;
                const scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scaleSize;
                const ctx = canvas.getContext('2d');

                  <main className="px-6 pt-8 pb-12 flex-1">
                    {currentView === 'dashboard' && renderDashboardCards()}
                    {currentView === 'finance' && renderFinance()}
                    {currentView === 'family' && renderMembers()}
                    {currentView === 'stories' && renderStories()}
                    {currentView === 'dates' && renderDates()}
                    {currentView === 'passwords' && renderPasswords()}
                    {currentView === 'plans' && renderPlans()}
                  </main>
                </div>
              )}

              {actionPinModal.show && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-md">
                  <div className="bg-white/10 backdrop-blur-2xl border border-white/20 w-full max-w-xs rounded-[2rem] p-6 text-center shadow-2xl">
                    <i className="fas fa-shield-cat text-rose-400 text-5xl mx-auto mb-4"></i>
                    <h3 className="font-bold text-white mb-6 tracking-wide">{actionPinModal.title}</h3>
                    <input type="password" value={actionPinInput} onChange={(e)=>setActionPinInput(e.target.value)} placeholder="PIN" className="glass-input w-full rounded-xl px-4 py-4 text-center font-bold tracking-[0.5em] text-xl mb-6 shadow-inner"/>
                    <div className="flex gap-3">
                      <button onClick={() => {setActionPinModal({show:false}); setActionPinInput('');}} className="flex-1 py-3 bg-white/10 hover:bg-white/20 border border-white/10 rounded-xl font-bold text-gray-300 transition-all">বাতিল</button>
                      <button onClick={verifyActionAndExecute} className="flex-1 py-3 bg-rose-500/80 hover:bg-rose-500 border border-rose-500/50 rounded-xl font-bold text-white transition-all shadow-lg">নিশ্চিত করুন</button>
                    </div>
                  </div>
                </div>
              )}

              {passFolderPinModal && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-md">
                  <div className="bg-white/10 backdrop-blur-2xl border border-white/20 w-full max-w-xs rounded-[2rem] p-6 text-center shadow-2xl">
                    <i className="fas fa-user-secret text-orange-400 text-5xl mx-auto mb-4"></i>
                    <h3 className="font-bold text-white mb-2 tracking-wide">সিকিউর ফোল্ডার</h3>
                    <p className="text-xs text-gray-400 mb-6">প্রবেশ করতে পিন প্রয়োজন</p>
                    <input type="password" value={passPinInput} onChange={(e)=>setPassPinInput(e.target.value)} placeholder="PIN" className="glass-input w-full rounded-xl px-4 py-4 text-center font-bold tracking-[0.5em] text-xl mb-6 shadow-inner"/>
                    <div className="flex gap-3">
                      <button onClick={() => setPassFolderPinModal(false)} className="flex-1 py-3 bg-white/10 hover:bg-white/20 border border-white/10 rounded-xl font-bold text-gray-300 transition-all">বাতিল</button>
                      <button onClick={openPasswordFolder} className="flex-1 py-3 bg-orange-500/80 hover:bg-orange-500 border border-orange-500/50 rounded-xl font-bold text-white transition-all shadow-lg">প্রবেশ করুন</button>
                    </div>
                  </div>
                </div>
              )}

              {activeModal && (
                <div className="fixed inset-0 z-40 flex flex-col justify-end bg-black/70 backdrop-blur-md sm:items-center sm:justify-center p-0 sm:p-4">
                  <div className="bg-[#1e293b]/90 backdrop-blur-2xl border border-white/20 w-full sm:max-w-md rounded-t-[2.5rem] sm:rounded-3xl p-6 max-h-[90vh] overflow-y-auto shadow-2xl">
                    <div className="flex justify-between items-center mb-8">
                      <h3 className="text-xl font-bold text-white tracking-wide">তথ্য আপডেট</h3>
                      <button onClick={() => setActiveModal(null)} className="w-10 h-10 bg-white/10 border border-white/10 flex items-center justify-center text-gray-300 rounded-full hover:bg-rose-500 hover:text-white hover:border-rose-500 transition-all"><i className="fas fa-times"></i></button>
                    </div>

                    <form onSubmit={(e) => {
                      e.preventDefault();
                      const fd = new FormData(e.target);
                      const data = Object.fromEntries(fd.entries());
                      
                      let collectionName = '';
                      if (activeModal === 'account') collectionName = 'finance_accounts';
                      if (activeModal === 'transaction') collectionName = 'finance_transactions';
                      if (activeModal === 'member') {
                         collectionName = 'family_members';
                         data.imageUrl = uploadedImage || editingItem?.imageUrl || '';
                      }
                      if (activeModal === 'story') collectionName = 'stories';
                      if (activeModal === 'date') collectionName = 'important_dates';
                      if (activeModal === 'password') collectionName = 'passwords';
                      if (activeModal === 'plan') collectionName = 'future_plans';

                      if (activeModal === 'transaction') {
                        const accId = data.accountId;
                        const acc = accounts.find(a => a.id === accId);
                        if(acc) {
                          const amount = Number(data.amount);
                          let newBalance = Number(acc.balance);
                          if (data.type === 'income' || data.type === 'borrowed') newBalance += amount;
                          if (data.type === 'expense' || data.type === 'lent') newBalance -= amount;
                          saveData('finance_accounts', {...acc, balance: newBalance}, acc.id);
                        }
                      }

                      if (editingItem) {
                        requireSecureAction(() => saveData(collectionName, {...editingItem, ...data}, editingItem.id), 'তথ্য এডিট করতে চান?');
                      } else {
                        saveData(collectionName, data);
                      }
                    }} className="space-y-4">
                      
                      {activeModal === 'account' && (
                        <>
                          <input name="name" defaultValue={editingItem?.name} placeholder="একাউন্টের নাম (যেমন: ডাচ বাংলা)" required className="glass-input w-full rounded-xl p-4 shadow-inner" />
                          <select name="type" defaultValue={editingItem?.type || 'bank'} className="glass-input w-full rounded-xl p-4 shadow-inner [&>option]:bg-slate-800">
                            <option value="cash">ক্যাশ (নগদ টাকা)</option>
                            <option value="bank">ব্যাংক</option>
                            <option value="bkash">বিকাশ/নগদ</option>
                          </select>
                          <input name="balance" type="number" defaultValue={editingItem?.balance || 0} placeholder="বর্তমান ব্যালেন্স" required className="glass-input w-full rounded-xl p-4 shadow-inner" />
                        </>
                      )}

                      {activeModal === 'transaction' && (
                        <>
                          <input name="source" defaultValue={editingItem?.source} placeholder={editingItem?.type==='income'?'আয়ের উৎস (যেমন বেতন)':editingItem?.type==='expense'?'ব্যয়ের নাম (যেমন বাজার)':editingItem?.type==='borrowed'?'কার কাছ থেকে ধার নিয়েছো?':'কাকে ধার দিয়েছো / কোন দোকানে বাকি?'} required className="glass-input w-full rounded-xl p-4 shadow-inner" />
                          <input name="amount" type="number" defaultValue={editingItem?.amount} placeholder="টাকার পরিমান" required className="glass-input w-full rounded-xl p-4 shadow-inner" />
                          <input name="date" type="date" defaultValue={editingItem?.date || new Date().toISOString().split('T')[0]} required className="glass-input w-full rounded-xl p-4 shadow-inner [&::-webkit-calendar-picker-indicator]:filter [&::-webkit-calendar-picker-indicator]:invert" />
                          <select name="accountId" defaultValue={editingItem?.accountId} required className="glass-input w-full rounded-xl p-4 shadow-inner [&>option]:bg-slate-800">
                            <option value="">কোন একাউন্ট থেকে?</option>
                            {accounts.map(a => <option key={a.id} value={a.id}>{a.name} ({formatMoney(a.balance)})</option>)}
                          </select>
                          <textarea name="note" defaultValue={editingItem?.note} placeholder="বিস্তারিত বিবরণ বা বাজারের লিস্ট..." rows={3} className="glass-input w-full rounded-xl p-4 resize-none shadow-inner"></textarea>
                          <input type="hidden" name="type" value={editingItem?.type || 'income'} />
                        </>
                      )}

                      {activeModal === 'member' && (
                        <>
                          <div className="flex flex-col items-center mb-6">
                             <div className="w-28 h-28 rounded-full bg-black/40 border-2 border-dashed border-white/30 flex items-center justify-center overflow-hidden mb-4 relative group shadow-inner">
                                {(uploadedImage || editingItem?.imageUrl) ? (
                                  <img src={uploadedImage || editingItem?.imageUrl} className="w-full h-full object-cover" />
                                ) : (
                                  <i className="fas fa-user text-4xl text-white/30"></i>
                                )}
                                <input type="file" accept="image/*" onChange={handleImageChange} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                             </div>
                             <div className="text-xs font-bold text-white bg-white/10 border border-white/20 px-5 py-2.5 rounded-full flex items-center gap-2 tracking-wide shadow-lg">
                                <i className="fas fa-camera"></i> ছবি নির্বাচন করুন
                             </div>
                          </div>
                          <input name="name" defaultValue={editingItem?.name} placeholder="নাম" required className="glass-input w-full rounded-xl p-4 shadow-inner" />
                          <input name="relation" defaultValue={editingItem?.relation} placeholder="সম্পর্ক (আমি, স্বামী, স্ত্রী, ছেলে...)" required className="glass-input w-full rounded-xl p-4 shadow-inner" />
                          <input name="mobile" defaultValue={editingItem?.mobile} placeholder="মোবাইল নাম্বার" className="glass-input w-full rounded-xl p-4 shadow-inner" />
                          <textarea name="note" defaultValue={editingItem?.note} placeholder="বিস্তারিত ঠিকানা, পেশা ইত্যাদি..." rows={4} className="glass-input w-full rounded-xl p-4 resize-none shadow-inner"></textarea>
                        </>
                      )}

                      {activeModal === 'story' && (
                        <>
                          <input name="title" defaultValue={editingItem?.title} placeholder="গল্পের শিরোনাম" required className="glass-input w-full rounded-xl p-4 shadow-inner" />
                          <textarea name="content" defaultValue={editingItem?.content} placeholder="তোমার মনের ভাবগুলো বিস্তারিত লেখো..." rows={6} required className="glass-input w-full rounded-xl p-4 resize-none shadow-inner"></textarea>
                        </>
                      )}

                      {activeModal === 'date' && (
                        <>
                          <input name="title" defaultValue={editingItem?.title} placeholder="কার জন্মদিন বা বিবাহ বার্ষিকী?" required className="glass-input w-full rounded-xl p-4 shadow-inner" />
                          <select name="type" defaultValue={editingItem?.type || 'জন্মদিন'} className="glass-input w-full rounded-xl p-4 shadow-inner [&>option]:bg-slate-800">
                            <option value="জন্মদিন">জন্মদিন</option>
                            <option value="বিবাহ বার্ষিকী">বিবাহ বার্ষিকী</option>
                            <option value="মৃত্যু বার্ষিকী">মৃত্যু বার্ষিকী</option>
                            <option value="অন্যান্য">অন্যান্য</option>
                          </select>
                          <input name="date" type="date" defaultValue={editingItem?.date} required className="glass-input w-full rounded-xl p-4 shadow-inner [&::-webkit-calendar-picker-indicator]:filter [&::-webkit-calendar-picker-indicator]:invert" />
                        </>
                      )}

                      {activeModal === 'password' && (
                        <>
                          <input name="platform" defaultValue={editingItem?.platform} placeholder="প্ল্যাটফর্ম (যেমন: Facebook, Gmail)" required className="glass-input w-full rounded-xl p-4 shadow-inner" />
                          <input name="userId" defaultValue={editingItem?.userId} placeholder="ইউজার আইডি বা ইমেইল" required className="glass-input w-full rounded-xl p-4 shadow-inner" />
                          <input name="password" type="password" defaultValue={editingItem?.password} placeholder="পাসওয়ার্ড" required className="glass-input w-full rounded-xl p-4 shadow-inner" />
                        </>
                      )}

                      {activeModal === 'plan' && (
                        <>
                          <input name="title" defaultValue={editingItem?.title} placeholder="পরিকল্পনার নাম (যেমন: সিলেট ট্যুর)" required className="glass-input w-full rounded-xl p-4 shadow-inner" />
                          <textarea name="details" defaultValue={editingItem?.details} placeholder="বিস্তারিত (কবে যাবে, কাদের সাথে, দাওয়াতের মেনু ইত্যাদি)..." rows={4} required className="glass-input w-full rounded-xl p-4 resize-none shadow-inner"></textarea>
                          <input name="budget" type="number" defaultValue={editingItem?.budget} placeholder="সম্ভাব্য খরচ (ঐচ্ছিক)" className="glass-input w-full rounded-xl p-4 shadow-inner" />
                        </>
                      )}

                      <div className="flex gap-3 pt-6">
                        <button type="button" onClick={() => setActiveModal(null)} className="flex-1 py-4 bg-white/10 hover:bg-white/20 border border-white/10 rounded-xl text-white font-bold transition-all shadow-lg">বাতিল</button>
                        <button type="submit" className="flex-1 py-4 bg-indigo-500/80 hover:bg-indigo-500 border border-indigo-500/50 rounded-xl text-white font-bold shadow-lg transition-all">সংরক্ষণ করুন</button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
